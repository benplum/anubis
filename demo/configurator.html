<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anubis Configurator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  </head>
  <body>
    <main class="mt-5 mb-6 px-3">
      <div class="navbar mb-5">
        <div class="navbar-start">
          <div class="navbar-item">
            <h1 class="title is-3">Configurator</h1>
          </div>
        </div>
        <div class="navbar-end">
          <div class="navbar-item">
            <a href="./index.html" class="button is-link">Open Demo</a>
          </div>
        </div>
      </div>

      <div class="columns is-variable is-2">
        <section class="column is-4">
          <article class="panel">
            <header class="panel-heading title is-5 mb-0">Configuration</header>
            <div class="panel-block is-block">
            <p id="error" class="notification is-danger is-light" hidden></p>

            <h3 class="title is-6">Core</h3>
            <label class="label">Version
              <input class="input" id="version" type="number" value="1" />
            </label>
            <label class="label">Storage key
              <input class="input" id="storageKey" value="consent-options" />
            </label>
            <label class="label">Storage duration (days)
              <input class="input" id="storageDuration" type="number" value="180" />
            </label>
            <label class="label">Default mode
              <select class="select" id="defaultMode">
                <option value="opt-out">opt-out</option>
                <option value="opt-in">opt-in</option>
              </select>
            </label>
            <label class="label">Unknown category behavior
              <select class="select" id="unknownPolicy">
                <option value="block">block</option>
                <option value="allow">allow</option>
              </select>
            </label>
            <label class="label">Resolve timeout (ms)
              <input class="input" id="regionTimeout" type="number" value="800" />
            </label>
            <label class="label">Region fallback
              <input class="input" id="region" value="" placeholder="US-CA" />
            </label>
            <label class="checkbox"><input id="regionCache" type="checkbox" checked /> regionCache</label>
            <br />
            <label class="label">Region cache key
              <input class="input" id="regionKey" value="consent-region" />
            </label>
            <label class="label">Region cache duration (days)
              <input class="input" id="regionDuration" type="number" value="1" />
            </label>

            <label class="checkbox"><input id="autoStart" type="checkbox" checked /> autoStart</label>
            <br />
            <label class="checkbox"><input id="fastDefaults" type="checkbox" checked /> fastDefaults</label>
            <br />
            <label class="checkbox"><input id="reloadOnRevoke" type="checkbox" checked /> reloadOnRevoke</label>

            <h3 class="title is-6 mt-4">Locale</h3>
            <label class="label">Active locale
              <input class="input" id="localeActive" value="" placeholder="en" />
            </label>
            <label class="label">Fallback locale
              <input class="input" id="localeFallback" value="en" />
            </label>

            <h3 class="title is-6 mt-4">Link actions</h3>
            <p><button class="button is-light is-small" id="addLinkAction" type="button">Add link</button></p>
            <div id="linksRepeater"></div>

            <h3 class="title is-6 mt-4">Categories</h3>
            <p><button class="button is-light is-small" id="addCategory" type="button">Add category</button></p>
            <div id="categoriesRepeater"></div>

            <h3 class="title is-6 mt-4">Locales</h3>
            <p><button class="button is-light is-small" id="addLocale" type="button">Add locale</button></p>
            <div id="localesRepeater"></div>

            <h3 class="title is-6 mt-4">Region overrides</h3>
            <p><button class="button is-light is-small" id="addRegionOverride" type="button">Add override</button></p>
            <div id="regionOverridesRepeater"></div>

            <h3 class="title is-6 mt-4">Preview Theme</h3>
            <label class="radio"><input type="radio" name="theme" value="light" checked /> light</label>
            <label class="radio"><input type="radio" name="theme" value="dark" /> dark</label>
            <label class="radio"><input type="radio" name="theme" value="none" /> none</label>

            <h3 class="title is-6 mt-4">Advanced JSON override (merged last)</h3>
            <textarea class="textarea" id="advancedJson" spellcheck="false" rows="8" placeholder='{"regionOverrides":{"US-CA":{"defaultMode":"opt-in"}}}'></textarea>
            </div>
          </article>
        </section>

        <section class="column is-8">
          <article class="panel">
            <header class="panel-heading title is-5 mb-0">Preview + JSON Output</header>
            <div class="panel-block is-block">
            <iframe id="previewFrame" title="Anubis Preview" height="560" style="width: 100%;"></iframe>
            <p class="buttons mt-3">
              <button class="button is-light is-small" id="importJson" type="button">Import JSON</button>
              <button class="button is-light is-small" id="copyJson" type="button">Copy JSON</button>
              <button class="button is-light is-small" id="downloadJson" type="button">Download JSON</button>
            </p>
            <input id="importJsonFile" type="file" accept="application/json,.json" hidden />
            <textarea class="textarea" id="jsonOutput" readonly spellcheck="false" rows="16"></textarea>
            </div>
          </article>
        </section>
      </div>
    </main>

    <script>
      (function () {
        const errorNode = document.getElementById('error');
        const frame = document.getElementById('previewFrame');
        const jsonOutput = document.getElementById('jsonOutput');
        const copyJson = document.getElementById('copyJson');
        const importJson = document.getElementById('importJson');
        const downloadJson = document.getElementById('downloadJson');
        const importJsonFile = document.getElementById('importJsonFile');
        const categoriesRepeater = document.getElementById('categoriesRepeater');
        const linksRepeater = document.getElementById('linksRepeater');
        const localesRepeater = document.getElementById('localesRepeater');
        const regionOverridesRepeater = document.getElementById('regionOverridesRepeater');
        const addCategory = document.getElementById('addCategory');
        const addLinkAction = document.getElementById('addLinkAction');
        const addLocale = document.getElementById('addLocale');
        const addRegionOverride = document.getElementById('addRegionOverride');

        function parseCsv(value) {
          return String(value || '')
            .split(',')
            .map((item) => item.trim())
            .filter(Boolean);
        }

        function parseJsonField(raw, fallback = {}) {
          const text = String(raw || '').trim();
          if (!text) {
            return fallback;
          }
          return JSON.parse(text);
        }

        function isObject(value) {
          return value && typeof value === 'object' && !Array.isArray(value);
        }

        function mergeDeep(target, source) {
          if (!isObject(target) || !isObject(source)) {
            return source;
          }
          const out = { ...target };
          Object.keys(source).forEach((key) => {
            const next = source[key];
            const prev = out[key];
            out[key] = isObject(prev) && isObject(next) ? mergeDeep(prev, next) : next;
          });
          return out;
        }

        function readTheme() {
          const selected = document.querySelector('input[name="theme"]:checked');
          return selected ? selected.value : 'light';
        }

        function createRepeaterItem(container, template) {
          const wrapper = document.createElement('article');
          wrapper.className = 'box mb-3';
          wrapper.setAttribute('data-repeater-item', '1');
          wrapper.innerHTML = template;
          container.appendChild(wrapper);
          return wrapper;
        }

        function addCategoryRow(name = '', keys = '', required = false) {
          return createRepeaterItem(
            categoriesRepeater,
            `<label class="label">Category name<input class="input" data-role="cat-name" value="${name}" /></label>
             <label class="label">Consent keys (csv)<input class="input" data-role="cat-keys" value="${keys}" /></label>
             <label class="checkbox"><input type="checkbox" data-role="cat-required" ${required ? 'checked' : ''} /> required</label>
             <br />
             <button class="button is-light is-small" type="button" data-action="remove-row">Remove</button>`,
          );
        }

        function addLinkActionRow(title = '', url = '') {
          return createRepeaterItem(
            linksRepeater,
            `<label class="label">Link title<input class="input" data-role="link-title" value="${title}" placeholder="Privacy policy" /></label>
             <label class="label">Link URL<input class="input" data-role="link-url" value="${url}" placeholder="/privacy" /></label>
             <button class="button is-light is-small" type="button" data-action="remove-row">Remove</button>`,
          );
        }

        function addLocaleRow(code = '', json = '') {
          return createRepeaterItem(
            localesRepeater,
            `<label class="label">Locale code<input class="input" data-role="locale-code" value="${code}" placeholder="en" /></label>
             <label class="label">Locale JSON<textarea class="textarea" data-role="locale-json" spellcheck="false" rows="5" placeholder='{"bannerTitle":"Privacy choices"}'>${json}</textarea></label>
             <button class="button is-light is-small" type="button" data-action="remove-row">Remove</button>`,
          );
        }

        function addRegionOverrideRow(region = '', json = '') {
          return createRepeaterItem(
            regionOverridesRepeater,
            `<label class="label">Region key<input class="input" data-role="region-key" value="${region}" placeholder="US-CA" /></label>
             <label class="label">Override JSON<textarea class="textarea" data-role="region-json" spellcheck="false" rows="5" placeholder='{"defaultMode":"opt-in"}'>${json}</textarea></label>
             <button class="button is-light is-small" type="button" data-action="remove-row">Remove</button>`,
          );
        }

        function clearRepeater(container) {
          container.innerHTML = '';
        }

        function encodeInlineJson(value) {
          if (!isObject(value)) {
            return '';
          }
          return JSON.stringify(value, null, 2);
        }

        function rowsToCategoryObject() {
          const out = {};
          categoriesRepeater.querySelectorAll('[data-repeater-item]').forEach((item) => {
            const name = item.querySelector('[data-role="cat-name"]').value.trim();
            const keys = parseCsv(item.querySelector('[data-role="cat-keys"]').value);
            const required = Boolean(item.querySelector('[data-role="cat-required"]') && item.querySelector('[data-role="cat-required"]').checked);
            if (name && keys.length) {
              out[name] = {
                consent: keys,
                required,
              };
            }
          });
          return out;
        }

        function rowsToLinkActions() {
          const out = [];
          linksRepeater.querySelectorAll('[data-repeater-item]').forEach((item) => {
            const title = item.querySelector('[data-role="link-title"]').value.trim();
            const url = item.querySelector('[data-role="link-url"]').value.trim();
            if (title && url) {
              out.push({ title, url });
            }
          });
          return out;
        }

        function rowsToLocalesObject() {
          const locales = {};
          localesRepeater.querySelectorAll('[data-repeater-item]').forEach((item) => {
            const code = item.querySelector('[data-role="locale-code"]').value.trim();
            const jsonText = item.querySelector('[data-role="locale-json"]').value;
            if (!code || !jsonText.trim()) {
              return;
            }
            const parsed = parseJsonField(jsonText, {});
            if (!isObject(parsed)) {
              throw new Error(`Locale ${code} JSON must be an object.`);
            }
            locales[code] = parsed;
          });
          return locales;
        }

        function rowsToRegionOverrides() {
          const overrides = {};
          regionOverridesRepeater.querySelectorAll('[data-repeater-item]').forEach((item) => {
            const key = item.querySelector('[data-role="region-key"]').value.trim();
            const jsonText = item.querySelector('[data-role="region-json"]').value;
            if (!key || !jsonText.trim()) {
              return;
            }
            const parsed = parseJsonField(jsonText, {});
            if (!isObject(parsed)) {
              throw new Error(`Region override ${key} JSON must be an object.`);
            }
            overrides[key] = parsed;
          });
          return overrides;
        }

        function buildOptions() {
          const locales = rowsToLocalesObject();
          const regionOverrides = rowsToRegionOverrides();

          const base = {
            autoStart: document.getElementById('autoStart').checked,
            version: Number(document.getElementById('version').value) || 1,
            storageKey: document.getElementById('storageKey').value.trim() || 'consent-options',
            storageDuration: Number(document.getElementById('storageDuration').value) || 180,
            defaultMode: document.getElementById('defaultMode').value,
            fastDefaults: document.getElementById('fastDefaults').checked,
            unknownPolicy: document.getElementById('unknownPolicy').value,
            reloadOnRevoke: document.getElementById('reloadOnRevoke').checked,
            region: document.getElementById('region').value.trim(),
            regionTimeout: Number(document.getElementById('regionTimeout').value) || 800,
            regionCache: document.getElementById('regionCache').checked,
            regionKey: document.getElementById('regionKey').value.trim() || 'consent-region',
            regionDuration: Number(document.getElementById('regionDuration').value) || 1,
            localeActive: document.getElementById('localeActive').value.trim(),
            localeFallback: document.getElementById('localeFallback').value.trim() || 'en',
            links: {
              actions: rowsToLinkActions(),
            },
            categories: rowsToCategoryObject(),
            regionOverrides,
            i18n: Object.keys(locales).length
              ? {
                localeActive: document.getElementById('localeActive').value.trim(),
                localeFallback: document.getElementById('localeFallback').value.trim() || 'en',
                locales,
              }
              : undefined,
          };

          const advanced = parseJsonField(document.getElementById('advancedJson').value, {});
          if (!isObject(advanced)) {
            throw new Error('Advanced JSON override must be an object.');
          }

          return mergeDeep(base, advanced);
        }

        function applyOptionsToForm(options) {
          const source = isObject(options) ? options : {};

          document.getElementById('autoStart').checked = source.autoStart !== false;
          document.getElementById('version').value = Number(source.version) || 1;
          document.getElementById('storageKey').value = source.storageKey || 'consent-options';
          document.getElementById('storageDuration').value = Number(source.storageDuration) || 180;
          document.getElementById('defaultMode').value = source.defaultMode === 'opt-in' ? 'opt-in' : 'opt-out';
          document.getElementById('fastDefaults').checked = source.fastDefaults !== false;
          document.getElementById('unknownPolicy').value = source.unknownPolicy === 'allow' ? 'allow' : 'block';
          document.getElementById('reloadOnRevoke').checked = source.reloadOnRevoke !== false;
          document.getElementById('region').value = source.region || '';
          document.getElementById('regionTimeout').value = Number(source.regionTimeout) || 800;
          document.getElementById('regionCache').checked = source.regionCache !== false;
          document.getElementById('regionKey').value = source.regionKey || 'consent-region';
          document.getElementById('regionDuration').value = Number(source.regionDuration) || 1;

          const links = isObject(source.links) ? source.links : {};

          clearRepeater(linksRepeater);
          if (Array.isArray(links.actions) && links.actions.length) {
            links.actions.forEach((item) => {
              if (isObject(item)) {
                addLinkActionRow(item.title || '', item.url || '');
              }
            });
          }

          document.getElementById('localeActive').value = source.localeActive || '';
          document.getElementById('localeFallback').value = source.localeFallback || 'en';

          clearRepeater(categoriesRepeater);
          const categories = isObject(source.categories) ? source.categories : {};
          const categoryEntries = Object.entries(categories);
          if (categoryEntries.length) {
            categoryEntries.forEach(([name, definition]) => {
              const parsed = isObject(definition) ? definition : {};
              const csv = Array.isArray(parsed.consent) ? parsed.consent.join(',') : '';
              addCategoryRow(name, csv, parsed.required === true);
            });
          } else {
            addCategoryRow('necessary', 'security_storage', true);
          }

          clearRepeater(localesRepeater);
          const i18n = isObject(source.i18n) ? source.i18n : {};
          const localeEntries = isObject(i18n.locales) ? Object.entries(i18n.locales) : [];
          if (localeEntries.length) {
            localeEntries.forEach(([code, payload]) => {
              addLocaleRow(code, encodeInlineJson(payload));
            });
          }

          clearRepeater(regionOverridesRepeater);
          const regionOverrides = isObject(source.regionOverrides) ? source.regionOverrides : {};
          const overrideEntries = Object.entries(regionOverrides);
          if (overrideEntries.length) {
            overrideEntries.forEach(([region, payload]) => {
              addRegionOverrideRow(region, encodeInlineJson(payload));
            });
          }

          const advanced = { ...source };
          delete advanced.autoStart;
          delete advanced.version;
          delete advanced.storageKey;
          delete advanced.storageDuration;
          delete advanced.defaultMode;
          delete advanced.fastDefaults;
          delete advanced.unknownPolicy;
          delete advanced.reloadOnRevoke;
          delete advanced.region;
          delete advanced.regionTimeout;
          delete advanced.regionCache;
          delete advanced.regionKey;
          delete advanced.regionDuration;
          delete advanced.localeActive;
          delete advanced.localeFallback;
          delete advanced.links;
          delete advanced.categories;
          delete advanced.regionOverrides;
          delete advanced.i18n;

          const i18nExtras = isObject(i18n)
            ? Object.fromEntries(Object.entries(i18n).filter(([key]) => !['localeActive', 'localeFallback', 'locales'].includes(key)))
            : {};
          if (Object.keys(i18nExtras).length) {
            advanced.i18n = i18nExtras;
          }

          const linksExtras = isObject(links)
            ? Object.fromEntries(Object.entries(links).filter(([key]) => key !== 'actions'))
            : {};
          if (Object.keys(linksExtras).length) {
            advanced.links = linksExtras;
          }

          document.getElementById('advancedJson').value = Object.keys(advanced).length
            ? JSON.stringify(advanced, null, 2)
            : '';
        }

        function update() {
          try {
            const options = buildOptions();
            const json = JSON.stringify(options, null, 2);
            jsonOutput.value = json;

            const params = new URLSearchParams({
              theme: readTheme(),
              options: encodeURIComponent(json),
            });
            frame.src = `./preview.html?${params.toString()}`;

            errorNode.hidden = true;
            errorNode.textContent = '';
          } catch (error) {
            errorNode.hidden = false;
            errorNode.textContent = error && error.message ? error.message : String(error);
          }
        }

        let t = null;
        const scheduleUpdate = () => {
          clearTimeout(t);
          t = setTimeout(update, 120);
        };

        async function copyText(text) {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            return true;
          }

          const helper = document.createElement('textarea');
          helper.value = text;
          helper.setAttribute('readonly', '');
          helper.style.position = 'fixed';
          helper.style.top = '-9999px';
          helper.style.left = '-9999px';
          document.body.appendChild(helper);
          helper.focus();
          helper.select();
          helper.setSelectionRange(0, helper.value.length);

          let success = false;
          try {
            success = document.execCommand('copy');
          } finally {
            helper.remove();
          }

          if (!success) {
            throw new Error('Clipboard copy command was blocked.');
          }

          return true;
        }

        addCategory.addEventListener('click', () => {
          addCategoryRow();
          scheduleUpdate();
        });

        addLinkAction.addEventListener('click', () => {
          addLinkActionRow();
          scheduleUpdate();
        });

        addLocale.addEventListener('click', () => {
          addLocaleRow();
          scheduleUpdate();
        });

        addRegionOverride.addEventListener('click', () => {
          addRegionOverrideRow();
          scheduleUpdate();
        });

        document.body.addEventListener('click', (event) => {
          const button = event.target.closest('[data-action="remove-row"]');
          if (!button) {
            return;
          }
          const row = button.closest('[data-repeater-item]');
          if (row) {
            row.remove();
            scheduleUpdate();
          }
        });

        document.body.addEventListener('input', (event) => {
          if (event.target.matches('input, select, textarea')) {
            scheduleUpdate();
          }
        });

        document.body.addEventListener('change', (event) => {
          if (event.target.matches('input, select, textarea')) {
            scheduleUpdate();
          }
        });

        copyJson.addEventListener('click', async () => {
          try {
            await copyText(jsonOutput.value);
            copyJson.textContent = 'Copied';
            setTimeout(() => {
              copyJson.textContent = 'Copy JSON';
            }, 900);
          } catch (_error) {
            copyJson.textContent = 'Copy failed';
            setTimeout(() => {
              copyJson.textContent = 'Copy JSON';
            }, 900);
          }
        });

        importJson.addEventListener('click', () => {
          importJsonFile.click();
        });

        importJsonFile.addEventListener('change', async () => {
          const file = importJsonFile.files && importJsonFile.files[0];
          if (!file) {
            return;
          }

          try {
            const text = await file.text();
            const parsed = JSON.parse(text);
            if (!isObject(parsed)) {
              throw new Error('Imported JSON must be an object.');
            }

            applyOptionsToForm(parsed);
            update();
            importJson.textContent = 'Imported';
            setTimeout(() => {
              importJson.textContent = 'Import JSON';
            }, 900);
          } catch (error) {
            errorNode.hidden = false;
            errorNode.textContent = error && error.message ? error.message : String(error);
            importJson.textContent = 'Import failed';
            setTimeout(() => {
              importJson.textContent = 'Import JSON';
            }, 900);
          } finally {
            importJsonFile.value = '';
          }
        });

        downloadJson.addEventListener('click', () => {
          try {
            const blob = new Blob([jsonOutput.value], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'anubis-options.json';
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
            downloadJson.textContent = 'Downloaded';
            setTimeout(() => {
              downloadJson.textContent = 'Download JSON';
            }, 900);
          } catch (_error) {
            downloadJson.textContent = 'Download failed';
            setTimeout(() => {
              downloadJson.textContent = 'Download JSON';
            }, 900);
          }
        });

        addCategoryRow('necessary', 'security_storage', true);
        addCategoryRow('marketing', 'ad_storage,ad_user_data,ad_personalization', false);
        addCategoryRow('analytics', 'analytics_storage', false);
        addCategoryRow('preferences', 'functionality_storage,personalization_storage', false);

        addLinkActionRow('Privacy policy', '#privacy');
        addLinkActionRow('Cookie policy', '#cookies');

        addLocaleRow('en', '{\n  "bannerTitle": "Privacy choices",\n  "bannerDescription": "Control consent categories for this demo page."\n}');
        addRegionOverrideRow('US-CA', '{\n  "defaultMode": "opt-in"\n}');

        update();
      }());
    </script>
  </body>
</html>
