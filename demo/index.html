<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anubis Consent Demo</title>
    <style>
      :root {
        --anubis-primary: #0f172a;
        --anubis-primary-contrast: #ffffff;
        --anubis-bg: #ffffff;
        --anubis-fg: #0f172a;
        --anubis-border: #cbd5e1;
        --anubis-muted: #475569;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin-top: 0;
      }

      .demo-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: 1fr;
      }

      .demo-card {
        min-width: 0;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 16px;
      }
      
      .demo-card h2 {
        margin-top: 0;
      }

      .demo-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button,
      a.button {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 8px;
        color: #0f172a;
        font-size: 14px;
        padding: 8px 12px;
        text-decoration: none;
        cursor: pointer;
      }
      
      button.active,
      a.button.active {
        background: #1d4ed8;
        color: #fff;
      }

      pre {
        max-height: 240px;
        overflow: auto;
        background: #0b1020;
        color: #e2e8f0;
        padding: 12px;
        border-radius: 8px;
      }
    </style>

    <script>
      const preset = new URLSearchParams(window.location.search).get('preset') || 'default';

      window.AnubisOptions = {
        version: 1,
        defaultConsentMode: 'opt-out',
        cookieDays: 180,
        links: {
          privacyPolicyUrl: '#privacy',
          cookiePolicyUrl: '#cookies'
        },
        i18n: {
          locales: {
            en: {
              bannerTitle: 'Privacy choices',
              bannerDescription: 'Control consent categories for this demo page.',
              acceptAll: 'Accept all',
              rejectAll: 'Reject all',
              manage: 'Manage',
              dialogTitle: 'Consent settings',
              dialogDescription: 'Enable categories you want to allow.',
              save: 'Save',
              cancel: 'Cancel',
              policyLabel: 'Read policy',
              categories: {
                necessary: { label: 'Necessary', description: 'Always required.' },
                marketing: { label: 'Marketing', description: 'Ads and related storage.' },
                analytics: { label: 'Analytics', description: 'Measurement scripts.' },
                preferences: { label: 'Preferences', description: 'Personalization settings.' }
              }
            }
          }
        }
      };

      if (preset === 'dialog-first') {
        window.AnubisOptions.actions = {
          banner: [
            { id: 'open', variant: 'primary', label: 'Review choices' }
          ],
          dialog: {
            header: [
              { id: 'close', variant: 'icon', label: 'Close dialog', closeDialog: true }
            ],
            footer: [
              { id: 'reject-all', variant: 'secondary', labelKey: 'rejectAll', closeDialog: true },
              { id: 'accept-all', variant: 'secondary', labelKey: 'acceptAll', closeDialog: true },
              { id: 'save', variant: 'primary', labelKey: 'save', closeDialog: true }
            ]
          }
        };
      } else if (preset === 'accept-only') {
        window.AnubisOptions.actions = {
          banner: [
            { id: 'accept-all', variant: 'primary', label: 'Accept all' },
            { id: 'open', variant: 'link', label: 'Customize' }
          ],
          dialog: {
            header: [
              { id: 'close', variant: 'icon', label: 'Close dialog', closeDialog: true }
            ],
            footer: [
              { id: 'reject-all', variant: 'secondary', labelKey: 'rejectAll', closeDialog: true },
              { id: 'save', variant: 'primary', labelKey: 'save', closeDialog: true }
            ]
          }
        };
      }
    </script>
    <script src="../dist/anubis.iife.js"></script>
    <script src="../dist/anubis-debug.iife.js"></script>
  </head>
  <body>
    <h1>Anubis Consent Demo</h1>

    <div class="demo-grid">
      <section class="demo-card">
        <h2>Preset Layouts</h2>
        <p>
          Active preset: <strong id="activePreset"></strong>
        </p>
        <div class="demo-actions">
          <a href="?preset=default" class="button">Default preset</a>
          <a href="?preset=dialog-first" class="button">Dialog-first preset</a>
          <a href="?preset=accept-only" class="button">Accept-only preset</a>
        </div>
      </section>

      <section class="demo-card">
        <h2>Developer Triggers</h2>
        <div class="demo-actions">
          <button data-consent-trigger="open">Open Preferences</button>
          <button data-consent-trigger="accept-all">Accept All</button>
          <button data-consent-trigger="reject-all">Reject All</button>
          <button id="showState">Log Current State</button>
          <button id="resetAnubis">Reset Demo</button>
        </div>
      </section>

      <section class="demo-card">
        <h2>Console Events</h2>
        <pre id="log"></pre>
      </section>
    </div>

    <script>
      (function () {
        // document.getElementById('activePreset').textContent =
        //   new URLSearchParams(window.location.search).get('preset') || 'default';
        const active = document.querySelector(`[href*="preset=${preset}"]`);
        active.classList.add('active');

        const logNode = document.getElementById('log');
        const pushLog = (label, payload) => {
          const line = `[${new Date().toLocaleTimeString()}] ${label} ${payload ? JSON.stringify(payload) : ''}`;
          logNode.textContent = `${line}\n${logNode.textContent}`;
          console.log(label, payload || '');
        };

        document.addEventListener('consent:ready', (e) => pushLog('ready', e.detail));
        document.addEventListener('consent:changed', (e) => pushLog('changed', e.detail));
        document.addEventListener('consent:revoked', (e) => pushLog('revoked', e.detail));

        document.getElementById('showState').addEventListener('click', () => {
          if (!window.Anubis) {
            pushLog('state', { error: 'Anubis API not ready' });
            return;
          }
          pushLog('state', window.Anubis.getState());
        });

        const deleteCookie = (name) => {
          const host = location.hostname || '';
          const hostParts = host.split('.').filter(Boolean);
          const domains = [''];
          for (let i = 0; i < hostParts.length; i += 1) {
            domains.push(`.${hostParts.slice(i).join('.')}`);
            domains.push(hostParts.slice(i).join('.'));
          }
          Array.from(new Set(domains)).forEach((domain) => {
            const domainPart = domain ? `; domain=${domain}` : '';
            document.cookie = `${name}=; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Path=/${domainPart}`;
            document.cookie = `${name}=; Max-Age=0; Path=/${domainPart}`;
          });
        };

        document.getElementById('resetAnubis').addEventListener('click', () => {
          const storageKey = (window.AnubisOptions && window.AnubisOptions.storageKey) || 'anubis-consent';
          const regionCacheKey =
            (window.AnubisOptions &&
              window.AnubisOptions.regionCache &&
              window.AnubisOptions.regionCache.key) ||
            'anubis-region-cache';

          try {
            localStorage.removeItem(storageKey);
            localStorage.removeItem('anibus-consent');
            localStorage.removeItem('anubis-consent');
            localStorage.removeItem(regionCacheKey);
            localStorage.removeItem('anubis-region-cache');
            sessionStorage.removeItem(regionCacheKey);
            sessionStorage.removeItem('anubis-region-cache');
            localStorage.removeItem('demo_preferences');
          } catch (_error) {
          }

          deleteCookie(storageKey);
          deleteCookie('anibus-consent');
          deleteCookie('anubis-consent');
          deleteCookie('demo_analytics');
          deleteCookie('demo_marketing');

          pushLog('reset', {
            cleared: [
              storageKey,
              'anibus-consent',
              'anubis-consent',
              regionCacheKey,
              'anubis-region-cache',
              'demo_preferences',
              'demo_analytics',
              'demo_marketing',
            ],
          });

          setTimeout(() => {
            location.reload();
          }, 150);
        });
      }());
    </script>

    <script data-consent-category="analytics" src="./scripts/analytics.js"></script>
    <script data-consent-category="marketing" src="./scripts/marketing.js"></script>
    <script data-consent-category="preferences" src="./scripts/preferences.js"></script>
  </body>
</html>
