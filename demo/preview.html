<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anubis Config Preview</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const allowedThemes = new Set(['none', 'light', 'dark']);
        const requestedTheme = params.get('theme');
        const theme = allowedThemes.has(requestedTheme) ? requestedTheme : 'light';

        const raw = params.get('options');
        let parsed = {};
        try {
          parsed = raw ? JSON.parse(decodeURIComponent(raw)) : {};
        } catch (_error) {
          parsed = {};
        }

        window.ConsentOptions = {
          version: 1,
          defaultMode: 'opt-out',
          links: [
            { title: 'Privacy policy', url: '#privacy' },
            { title: 'Cookie policy', url: '#cookies' },
          ],
          styles: theme === 'none' ? '' : `../dist/css/theme-${theme}.css`,
          ...parsed,
        };
      }());
    </script>
    <script src="../dist/js/consent.bundled.js"></script>
  </head>
  <body>
    <main class="container is-max-desktop mt-5 mb-6 px-3">
      <div class="navbar mb-5">
        <div class="navbar-start">
          <div class="navbar-item">
            <h1 class="title is-3">Preview</h1>
          </div>
        </div>
      </div>

      <section class="mb-5 panel">
        <h2 class="panel-heading title is-5 mb-0">Triggers</h2>
        <div class="panel-block buttons p-5">
          <button class="button is-light is-small" data-consent="open">Open Preferences</button>
          <button class="button is-light is-small" data-consent="accept">Accept All</button>
          <button class="button is-light is-small" data-consent="reject">Reject All</button>
          <button class="button is-light is-small" id="showState">Log State</button>
          <button class="button is-light is-small" id="resetPreview">Reset</button>
        </div>
      </section>

      <section class="mb-5 panel">
        <h2 class="panel-heading title is-5 mb-0">Events</h2>
        <div class="panel-block p-0">
          <pre id="log"></pre>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const logNode = document.getElementById('log');
        const pushLog = (label, payload) => {
          const line = `[${new Date().toLocaleTimeString()}] ${label} ${payload ? JSON.stringify(payload) : ''}`;
          logNode.textContent = `${line}\n${logNode.textContent}`;
        };

        document.addEventListener('consent:ready', (e) => pushLog('ready', e.detail));
        document.addEventListener('consent:updated', (e) => pushLog('changed', e.detail));
        document.addEventListener('consent:revoked', (e) => pushLog('revoked', e.detail));

        document.getElementById('showState').addEventListener('click', () => {
          if (!window.Anubis) {
            pushLog('state', { error: 'Anubis API not ready' });
            return;
          }
          pushLog('state', window.Anubis.getState());
        });

        const deleteCookie = (name) => {
          const host = location.hostname || '';
          const hostParts = host.split('.').filter(Boolean);
          const domains = [''];
          for (let i = 0; i < hostParts.length; i += 1) {
            domains.push(`.${hostParts.slice(i).join('.')}`);
            domains.push(hostParts.slice(i).join('.'));
          }
          Array.from(new Set(domains)).forEach((domain) => {
            const domainPart = domain ? `; domain=${domain}` : '';
            document.cookie = `${name}=; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Path=/${domainPart}`;
            document.cookie = `${name}=; Max-Age=0; Path=/${domainPart}`;
          });
        };

        document.getElementById('resetPreview').addEventListener('click', () => {
          const storageKey = (window.ConsentOptions && window.ConsentOptions.storageKey) || 'consent-options';
          const regionKey =
            (window.ConsentOptions && typeof window.ConsentOptions.regionKey === 'string' && window.ConsentOptions.regionKey) ||
            'consent-region';

          try {
            localStorage.removeItem(storageKey);
            localStorage.removeItem('consent-options');
            localStorage.removeItem(regionKey);
          } catch (_error) {
          }

          deleteCookie(storageKey);
          deleteCookie('consent-options');
          deleteCookie(regionKey);
          deleteCookie('demo_analytics');
          deleteCookie('demo_marketing');

          pushLog('reset', {
            cleared: [
              storageKey,
              'consent-options',
              regionKey,
              'demo_analytics',
              'demo_marketing',
            ],
          });

          setTimeout(() => {
            location.reload();
          }, 150);
        });
      }());
    </script>

    <script data-consent-category="analytics" src="./scripts/analytics.js"></script>
    <script data-consent-category="marketing" src="./scripts/marketing.js"></script>
    <script data-consent-category="preferences" src="./scripts/preferences.js"></script>
  </body>
</html>
